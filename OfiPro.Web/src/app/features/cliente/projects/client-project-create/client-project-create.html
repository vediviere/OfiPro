<section class="create-page">
  <a routerLink="/cliente/proyectos" class="back-link">← Volver a mis proyectos</a>

  <header class="page-header">
    <h1>Crear proyecto</h1>
    <p>Publica una necesidad para que los contratistas puedan enviar propuestas.</p>
  </header>

  @if (errorMessage) {
    <div class="error-message">{{ errorMessage }}</div>
  }

  <form class="project-form" (ngSubmit)="save()">
    <div class="form-grid">
      <label>
        Título
        <input
          name="title"
          type="text"
          [(ngModel)]="form.title"
          placeholder="Ej. Reparación de instalación eléctrica"
          required
        />
      </label>

      <label>
        Urgencia
        <select name="urgency" [(ngModel)]="form.urgency">
          @for (option of urgencyOptions; track option.value) {
            <option [ngValue]="option.value">{{ option.label }}</option>
          }
        </select>
      </label>

      <label>
        Estado
        <input name="state" type="text" [(ngModel)]="form.state" required />
      </label>

      <label>
        Ciudad
        <input
          name="city"
          type="text"
          [(ngModel)]="form.city"
          placeholder="Ej. Villa Lázaro Cárdenas"
          required
        />
      </label>

      <label>
        Zona o colonia
        <input name="zone" type="text" [(ngModel)]="form.zone" placeholder="Opcional" />
      </label>

      <label>
        Materiales disponibles
        <input
          name="availableMaterials"
          type="text"
          [(ngModel)]="form.availableMaterials"
          placeholder="Ej. Tengo 2 bultos de cemento"
        />
      </label>
    </div>

    <label>
      Descripción general
      <textarea
        name="description"
        rows="5"
        [(ngModel)]="form.description"
        placeholder="Describe qué necesitas, dónde será el trabajo y cualquier detalle importante."
        required
      ></textarea>
    </label>

    <div class="requirements-box">
      <h2>Requerimiento del proyecto</h2>
      <p>Selecciona la categoría principal del trabajo y después el tipo específico de servicio.</p>

      <div class="form-grid">
        <label>
          Categoría
          <select
            name="categoryId"
            [(ngModel)]="form.categoryId"
            (change)="onCategoryChange()"
            required
          >
            <option value="">
              {{ isLoadingCategories ? 'Cargando categorías...' : 'Selecciona una categoría' }}
            </option>

            @for (category of categories; track category.categoryId) {
              <option [value]="category.categoryId">
                {{ category.name }}
              </option>
            }
          </select>
        </label>

        <label>
          Subcategoría
          <select
            name="subcategoryId"
            [(ngModel)]="form.subcategoryId"
            [disabled]="!form.categoryId || isLoadingSubcategories"
            required
          >
            <option value="">
              {{
                isLoadingSubcategories ? 'Cargando subcategorías...' : 'Selecciona una subcategoría'
              }}
            </option>

            @for (subcategory of subcategories; track subcategory.subcategoryId) {
              <option [value]="subcategory.subcategoryId">
                {{ subcategory.name }}
              </option>
            }
          </select>
        </label>
      </div>

      <label>
        Descripción del requerimiento
        <textarea
          name="requirementDescription"
          rows="4"
          [(ngModel)]="form.requirementDescription"
          placeholder="Ej. Necesito revisar contactos, cableado y centro de carga."
          required
        ></textarea>
      </label>
    </div>

    <button type="submit" class="primary-button" [disabled]="isSaving">
      {{ isSaving ? 'Guardando...' : 'Crear proyecto' }}
    </button>
  </form>
</section>
