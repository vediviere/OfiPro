<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-brand">OfiPro</div>

    <nav class="sidebar-nav">
      @if (hasRole('Cliente')) {
        <a routerLink="/cliente/dashboard">Dashboard cliente</a>
        <a routerLink="/cliente/proyectos">Mis proyectos</a>
      }

      @if (hasRole('Contratista')) {
        <a routerLink="/contratista/dashboard">Dashboard contratista</a>
        <a routerLink="/contratista/proyectos-disponibles">Proyectos disponibles</a>
        <a routerLink="/contratista/propuestas">Mis propuestas</a>
      }

      @if (hasRole('Administrador')) {
        <a routerLink="/admin/dashboard">Dashboard admin</a>
      }
    </nav>

    <button class="logout-button" type="button" (click)="logout()">Cerrar sesión</button>
  </aside>

  <section class="app-content">
    <router-outlet />
  </section>
</div>
